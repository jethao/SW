interface:
  display_name: "FW MGR"
  short_description: "Advance all ready firmware tickets while reviewing open PRs and skipping blocked work"
  default_prompt: "Use $fw-mgr to first gather backlog story state, active PR state, dependency context, and review history before making API writes, then reconcile backlog FIR stories, select unblocked FIR tickets, invoke FW-ENG for ready tickets, invoke FW-CR for open firmware PRs that need review attention, generate SW/FW/fw-mgr.rpt, and continue only for tickets that still have no dependency or blocker gaps."
