<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirHealth Software Architecture Specification</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --panel: #fffdfa;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #ddd6c7;
        --accent: #0f766e;
        --accent-soft: #d9f0ea;
        --code-bg: #f8fafc;
        --table-head: #f3efe6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px 20px 56px;
        background: linear-gradient(180deg, #f6f1e8 0%, #ede4d2 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
      }

      .shell {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .hero {
        padding: 28px 32px 20px;
        border-bottom: 1px solid var(--border);
        background: radial-gradient(circle at top left, #fff9ec 0%, #fffdfa 52%, #f3f7f6 100%);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font: 600 0.9rem/1.2 Georgia, "Times New Roman", serif;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 2.3rem;
        line-height: 1.1;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      article {
        padding: 32px;
      }

      h1, h2, h3, h4 {
        color: #12212a;
      }

      h2 {
        margin-top: 2.4rem;
        padding-top: 0.2rem;
        border-top: 1px solid #ece6da;
        font-size: 1.7rem;
      }

      h3 {
        margin-top: 1.8rem;
        font-size: 1.2rem;
        color: var(--accent);
      }

      h4 {
        margin-top: 1.4rem;
        font-size: 1.05rem;
      }

      p, li {
        font-size: 1rem;
        line-height: 1.68;
      }

      ul, ol {
        padding-left: 1.4rem;
      }

      code {
        padding: 0.12rem 0.32rem;
        border-radius: 6px;
        background: var(--code-bg);
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 0.92em;
      }

      pre {
        padding: 16px;
        overflow-x: auto;
        border: 1px solid #e7e5e4;
        border-radius: 12px;
        background: var(--code-bg);
      }

      pre code {
        padding: 0;
        background: transparent;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 18px 0 24px;
        font-size: 0.95rem;
      }

      th, td {
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        vertical-align: top;
        text-align: left;
      }

      th {
        background: var(--table-head);
      }

      blockquote {
        margin: 18px 0;
        padding: 10px 16px;
        border-left: 4px solid var(--accent);
        background: #fafaf9;
        color: #374151;
      }

      .diagram {
        margin: 20px 0 28px;
        padding: 16px;
        border: 1px solid #d8e3e0;
        border-radius: 14px;
        background: linear-gradient(180deg, #fcfffe 0%, #f6fbfa 100%);
        overflow-x: auto;
      }

      hr {
        border: 0;
        border-top: 1px solid #e7e5e4;
        margin: 28px 0;
      }

      .loading {
        color: var(--muted);
      }

      @media (max-width: 800px) {
        body {
          padding: 16px 12px 32px;
        }

        .hero,
        article {
          padding: 20px;
        }

        h1 {
          font-size: 1.9rem;
        }
      }
    </style>
  </head>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

      const markdown = atob(window.__ARCH_MD_B64__);
      const content = document.getElementById('content');
      const renderer = new marked.Renderer();
      const escapeHtml = (value) => value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      renderer.code = ({ text, lang }) => {
        if (lang === 'mermaid') {
          return `<div class="diagram"><div class="mermaid">${text}</div></div>`;
        }
        const safe = escapeHtml(text);
        const className = lang ? ` class="language-${lang}"` : '';
        return `<pre><code${className}>${safe}</code></pre>`;
      };

      marked.setOptions({
        renderer,
        gfm: true,
        breaks: false,
        headerIds: true
      });

      content.innerHTML = marked.parse(markdown);

      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose'
      });

      await mermaid.run({
        querySelector: '.mermaid'
      });
    </script>
