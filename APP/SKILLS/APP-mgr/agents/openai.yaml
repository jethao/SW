interface:
  display_name: "APP MGR"
  short_description: "Advance APP backlog work with parallel APP-ENG lanes and APP-CR review loops"
  default_prompt: "Use $app-mgr to first gather APP backlog state, parent-ticket completion state, active PR state, dependency context, and review history before making API writes, then reconcile backlog parents, invoke APP-ENG for all unblocked APP work when no app PR batch is open, allow independent no-blocker tickets to proceed in parallel, invoke APP-CR to review open app PRs, alternate APP-ENG and APP-CR until review comments are addressed, and refresh SW/APP/manager.rpt."
